services:
  - type: web
    name: kfats-server
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: |
      npm ci --include=dev
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: APP_NAME
        value: "Kushtia Charukola"
      - key: APP_URL
        value: "https://kfats-49p7.onrender.com"
      - key: CLIENT_URL
        value: "https://kfats.onrender.com"
      - key: SESSION_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: JWT_COOKIE_EXPIRES_IN
        value: "7"
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false 